name: Python CI/CD (PyPI Publish)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'py_package/**'
      - '.github/workflows/python-ci-cd.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-build-publish:
    name: Test, Build and Publish Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: py_package
        run: |
          python -m pip install --upgrade pip
          pip install build pytest httpx

      - name: Run Tests
        working-directory: py_package
        run: |
          pytest tests/

      - name: Build Package
        working-directory: py_package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: py_package/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
